<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPAE IA — Iniciar sesión</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .login-page { max-width: 420px; margin-top: 4rem; }
    </style>
</head>
<body>
    <div class="page login-page">
        <header class="header" style="justify-content:center; text-align:center;">
            <div class="logo" style="justify-content:center;">
                <div class="logo-icon">N</div>
                <div>
                    <h1>NutriPAE IA</h1>
                    <p class="tagline">Apoyo a la Decisión Clínica • PAE Colombia</p>
                </div>
            </div>
        </header>

        <form id="login-form" class="form-card">
            <div class="card-header">
                <h2>Iniciar sesión</h2>
                <p class="card-subtitle">Acceso para nutricionistas, docentes y administradores.</p>
            </div>
            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="nutri@colegio.edu.co">
                </div>
                <div class="form-group full-width">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required minlength="6" placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="btn-submit" id="btn-login-submit">
                <span class="btn-text">Ingresar</span>
                <div class="btn-loading hidden"><span class="spinner"></span><span>Verificando...</span></div>
            </button>
            <p class="card-subtitle" style="margin-top:1rem;">
                ¿No tiene cuenta? Un administrador debe registrarle.
            </p>
            <a class="btn-link" href="index.html" style="margin-top:0.75rem;">← Volver a la app</a>
        </form>

        <div id="bootstrap-info" class="form-card" style="margin-top:1rem;">
            <div class="card-header">
                <h3>Primer uso</h3>
                <p class="card-subtitle">Si el sistema aún no tiene usuarios, regístrese como administrador.</p>
            </div>
            <form id="bootstrap-form">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="b_email">Email</label>
                        <input type="email" id="b_email" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="b_nombre">Nombre</label>
                        <input type="text" id="b_nombre" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="b_password">Contraseña (mín. 6)</label>
                        <input type="password" id="b_password" minlength="6" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Crear primer administrador</button>
            </form>
        </div>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="login.js" type="module"></script>
</body>
</html>
