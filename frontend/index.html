<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriIA - Evaluación Nutricional</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>NutriIA</h1>
            <p class="subtitle">Sistema de Apoyo a la Decisión Clínica Nutricional - PAE Colombia</p>
        </header>

        <div class="disclaimer" id="disclaimer-bar">
            <input type="checkbox" id="disclaimer-check">
            <label for="disclaimer-check">
                <strong>Aviso Ético y Legal:</strong> Esta herramienta es un sistema de apoyo a la decisión clínica (CDSS) 
                y <strong>no reemplaza</strong> el criterio médico profesional. Los resultados deben ser validados por un 
                profesional de salud calificado. Al marcar esta casilla, usted acepta que los datos ingresados son anonimizados 
                y se procesan conforme a la Ley 1581 de 2012 (Protección de Datos Personales, Colombia).
            </label>
        </div>

        <form id="evaluation-form" class="form-card disabled" disabled>
            <h2>Datos del Estudiante</h2>

            <div class="form-grid">
                <div class="form-group">
                    <label for="edad">Edad (años)</label>
                    <input type="number" id="edad" name="edad" min="1" max="18" required placeholder="Ej: 10">
                </div>

                <div class="form-group">
                    <label for="genero">Género</label>
                    <select id="genero" name="genero" required>
                        <option value="">Seleccione...</option>
                        <option value="0">Femenino</option>
                        <option value="1">Masculino</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="actividad_fisica">Nivel de Actividad Física</label>
                    <select id="actividad_fisica" name="actividad_fisica" required>
                        <option value="">Seleccione...</option>
                        <option value="0">Baja</option>
                        <option value="1">Media</option>
                        <option value="2">Alta</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="condicion_medica">Condición Médica Preexistente</label>
                    <select id="condicion_medica" name="condicion_medica" required>
                        <option value="">Seleccione...</option>
                        <option value="0">No</option>
                        <option value="1">Sí</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="peso">Peso (kg)</label>
                    <input type="number" id="peso" name="peso" min="1" max="150" step="0.1" required placeholder="Ej: 35.0">
                </div>

                <div class="form-group">
                    <label for="estatura">Estatura (m)</label>
                    <input type="number" id="estatura" name="estatura" min="0.5" max="2.5" step="0.01" required placeholder="Ej: 1.40">
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btn-submit">Evaluar Estado Nutricional</button>
        </form>

        <div id="result-container" class="result-card hidden">
            <h2>Resultado de la Evaluación</h2>
            <div id="result-content">
                <div class="result-imc">
                    <span class="label">IMC Calculado:</span>
                    <span id="result-imc-value" class="value">--</span>
                </div>
                <div class="result-main">
                    <div id="result-icon" class="result-icon"></div>
                    <div class="result-text">
                        <h3 id="result-prediccion">--</h3>
                        <p id="result-descripcion">--</p>
                    </div>
                </div>
                <div class="result-action">
                    <span class="label">Acción Recomendada:</span>
                    <p id="result-accion" class="action-text">--</p>
                </div>
                <div id="result-alert-bar" class="alert-bar"></div>
            </div>
        </div>

        <div id="error-container" class="error-card hidden">
            <p id="error-message"></p>
        </div>
    </div>

    <footer>
        <p>NutriIA v1.0.0 &mdash; Prototipo de Investigación &mdash; PAE Colombia</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
